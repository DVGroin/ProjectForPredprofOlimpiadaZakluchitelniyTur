{% extends 'base.html' %}
{% block title %}Список пользователей{% endblock %}
{% block content %}
<h2>Пользователи</h2>
<ul class="list-group">
    {% for user in users %}
        <li class="list-group-item">{{ user.profile.first_name }} {{ user.profile.last_name }} ({{ user.username }})</li>
    {% endfor %}
</ul>
{% endblock %}
