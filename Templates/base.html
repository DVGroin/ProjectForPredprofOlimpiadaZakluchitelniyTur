<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Классификатор сигналов{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'profile' %}">Главная</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Профиль</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'analytics' %}">Аналитика</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'upload_test' %}">Загрузить тест</a></li>
                        {% if user.profile.role == 'admin' %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'create_user' %}">Создать пользователя</a></li>
                            <li class="nav-item"><a class="nav-link" href="{% url 'user_list' %}">Список пользователей</a></li>
                        {% endif %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Выйти</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
